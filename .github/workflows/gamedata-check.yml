# Vérifie chaque jour si tycoon-tools a changé (patch du jeu).
# En cas d'écart : régénère site/data.js et ouvre une Pull Request à relire.
# Le job « signals » surveille en plus des sources communautaires indépendantes
# (wikis, guide) et ouvre une issue quand elles bougent — alerte précoce, sans
# toucher aux données.
# Lancement manuel possible : onglet Actions → Check game data → Run workflow.
name: Check game data

on:
  schedule:
    - cron: '30 7 * * *'   # tous les jours, 07:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect game data drift
        id: drift
        run: |
          if python3 tools/update-gamedata.py --check; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate data.js
        if: steps.drift.outputs.drift == 'true'
        run: python3 tools/update-gamedata.py

      - name: Set up Node.js
        if: steps.drift.outputs.drift == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Regenerate SEO content pages and sitemap
        if: steps.drift.outputs.drift == 'true'
        run: node tools/generate-seo-pages.js

      - name: Run tracker tests against the new data
        if: steps.drift.outputs.drift == 'true'
        working-directory: tests
        run: |
          npm install --no-fund --no-audit
          node test-droidex.js

      - name: Open a pull request
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/gamedata-update
          title: '🤖 Game data update detected on tycoon-tools'
          commit-message: 'Update game data from tycoon-tools'
          add-paths: |
            site/data.js
            site/value-list
            site/rebirth-requirements
            site/faq
            site/sitemap.xml
          body: |
            The scheduled check found that [tycoon-tools](https://tycoon-tools.com/droid-tycoon/) no longer matches `site/data.js` — the game was probably patched.

            `site/data.js` has been regenerated, the SEO content pages and sitemap were rebuilt from the new data, and the tracker test suite passed against it.

            **Before merging:**
            - [ ] Review the diff (rebalanced requirements? new incomes? new droid?)
            - [ ] SEO pages regenerated (value list / rebirths / FAQ / sitemap)
            - [ ] Bump `APP_VERSION` in `site/version.js`
            - [ ] Add a `CHANGELOG.md` entry
            - [ ] After merge: `cd /opt/sites/droidex && git pull && docker compose up -d --build droidex`

  # L'Ecosystem API d'Epic ne garde que 7 jours glissants : on recopie chaque
  # jour les métriques officielles de l'île dans data/metrics/ (histoire
  # complète du jeu, introuvable ailleurs).
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Archive island metrics (Ecosystem API, 7-day window)
        run: python3 tools/archive-metrics.py

      - name: Commit the archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/metrics; then
            git add data/metrics
            git commit -m "bot: archive des métriques de l'île (Ecosystem API)"
            git pull --rebase origin main
            git push
          fi

  signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check community and official sources (Discord mirror, wikis, guide)
        id: sig
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_PATCH_CHANNEL_ID: ${{ secrets.DISCORD_PATCH_CHANNEL_ID }}
        run: |
          set +e
          python3 tools/watch-signals.py | tee signals.txt
          code=$?
          set -e
          if [ "$code" = "10" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" != "0" ]; then
            exit "$code"
          fi

      - name: Persist watch state
        if: steps.sig.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/watch-state.json
          git commit -m "bot: état des signaux communautaires"
          git pull --rebase origin main
          git push

      - name: Open or update the signal issue
        if: steps.sig.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Des sources communautaires indépendantes de tycoon-tools ont bougé — le jeu a peut-être été patché."
            echo
            echo '```'
            cat signals.txt
            echo '```'
            echo
            echo "_Ce signal n'a modifié aucune donnée : la veille tycoon-tools ouvrira sa PR \`bot/gamedata-update\` quand la value list changera. Fermer cette issue une fois le patch identifié (ou écarté)._"
          } > body.md
          NUM=$(gh issue list --label gamedata-signal --state open --json number --jq '.[0].number')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body-file body.md
          else
            gh issue create --title "📡 Signal communautaire : patch du jeu possible" \
              --label gamedata-signal --body-file body.md
          fi
