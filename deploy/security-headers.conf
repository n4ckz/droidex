# En-têtes de sécurité — inclus dans CHAQUE location (nginx n'hérite pas des
# add_header dès qu'une location en définit un elle-même).
# CSP : pas de script inline (le JSON-LD est inerte, non concerné) ;
# styles inline autorisés (attributs style de index.html) ;
# connect-src https: pour l'API PocketBase quel que soit le domaine d'hébergement.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; worker-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
