# Déploiement VPS derrière Traefik v2/v3 (réseau docker externe existant).
# Configuration dans un fichier .env :
#   DROIDEX_DOMAIN=droidex.mondomaine.fr   (site ; l'API est servie sur api.<domaine>)
#   TRAEFIK_NETWORK=proxy                  (nom du réseau externe de Traefik)
#   TRAEFIK_CERTRESOLVER=letsencrypt       (nom du résolveur de certificats)
# Le DNS du domaine ET de api.<domaine> doit pointer vers le VPS.
# Pour un test local sans Traefik : docker compose -f docker-compose.local.yml up -d

services:
  droidex:
    build: .
    image: droidex-tracker:latest
    container_name: droidex
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.droidex.rule=Host(`${DROIDEX_DOMAIN}`)"
      - "traefik.http.routers.droidex.entrypoints=websecure"
      - "traefik.http.routers.droidex.tls=true"
      - "traefik.http.routers.droidex.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.droidex.loadbalancer.server.port=80"

  pocketbase:
    build:
      context: deploy
      dockerfile: pocketbase.Dockerfile
    image: droidex-pocketbase:latest
    container_name: droidex-pocketbase
    restart: unless-stopped
    volumes:
      - ./pb_data:/pb/pb_data
    ports:
      # console d'admin accessible UNIQUEMENT depuis le VPS (tunnel SSH) :
      #   ssh -L 8091:127.0.0.1:8091 mon-vps   →   http://localhost:8091/_/
      - "127.0.0.1:8091:8090"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.droidex-api.rule=Host(`api.${DROIDEX_DOMAIN}`)"
      - "traefik.http.routers.droidex-api.entrypoints=websecure"
      - "traefik.http.routers.droidex-api.tls=true"
      - "traefik.http.routers.droidex-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.droidex-api.loadbalancer.server.port=8090"
      # la console d'admin (/_/) et l'auth superuser ne sont pas exposées à Internet
      # (Traefik v2 : remplacer ipallowlist par ipwhitelist)
      - "traefik.http.routers.droidex-api-admin.rule=Host(`api.${DROIDEX_DOMAIN}`) && (PathPrefix(`/_/`) || PathPrefix(`/api/collections/_superusers`))"
      - "traefik.http.routers.droidex-api-admin.entrypoints=websecure"
      - "traefik.http.routers.droidex-api-admin.tls=true"
      - "traefik.http.routers.droidex-api-admin.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.droidex-api-admin.priority=100"
      - "traefik.http.routers.droidex-api-admin.middlewares=droidex-admin-block"
      - "traefik.http.routers.droidex-api-admin.service=droidex-api"
      # IPs autorisées sur la console d'admin (négociées via .env ; défaut : tunnel SSH uniquement)
      - "traefik.http.middlewares.droidex-admin-block.ipallowlist.sourcerange=${DROIDEX_ADMIN_IPS:-127.0.0.1/32}"

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
